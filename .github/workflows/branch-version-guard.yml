name: Branch Version Guard

on:
  push:
    branches:
      - master
      - next/v3
  pull_request:
    branches:
      - master
      - next/v3

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate package version against branch policy
        run: |
          node -e "
          const fs = require('node:fs');
          const ref = process.env.GITHUB_REF || '';
          const version = JSON.parse(fs.readFileSync('package.json', 'utf8')).version || '';
          const semverRe = /^\\d+\\.\\d+\\.\\d+(?:-[0-9A-Za-z.-]+)?$/;
          if (!semverRe.test(version)) {
            console.error('Invalid package.json version: ' + version);
            process.exit(1);
          }
          const isPrerelease = version.includes('-');
          if (ref === 'refs/heads/master' && isPrerelease) {
            console.error('master requires stable version (no prerelease): ' + version);
            process.exit(1);
          }
          if (ref === 'refs/heads/next/v3' && !isPrerelease) {
            console.error('next/v3 requires prerelease version: ' + version);
            process.exit(1);
          }
          console.log('Version policy passed on ' + ref + ': ' + version);
          "

      - name: Build
        run: npm run build
